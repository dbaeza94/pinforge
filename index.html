<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PinForge</title>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;600;800;900&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#050505;--lime:#d4ff4e;--text:#f0f0f5;--subtle:#8080a0;--border:rgba(255,255,255,0.06);--spring:cubic-bezier(0.32,0.72,0,1)}
    body{background:var(--bg);color:var(--text);font-family:"Geist",sans-serif;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased;overflow:hidden}
    body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.025;background-size:200px 200px}
    .orb{position:fixed;border-radius:50%;pointer-events:none;filter:blur(80px)}
    .o1{width:600px;height:600px;top:-200px;left:-100px;background:radial-gradient(circle,rgba(212,255,78,0.06) 0%,transparent 70%)}
    .o2{width:400px;height:400px;bottom:0;right:-80px;background:radial-gradient(circle,rgba(78,100,255,0.05) 0%,transparent 70%)}
    .card{position:relative;z-index:2;background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:28px;padding:4px;box-shadow:0 0 0 1px rgba(0,0,0,0.6),0 24px 64px rgba(0,0,0,0.5)}
    .card-inner{background:#111116;border-radius:calc(28px - 4px);padding:52px 60px;text-align:center;box-shadow:inset 0 1px 0 rgba(255,255,255,0.06)}
    .mark{width:48px;height:48px;background:var(--lime);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 28px}
    .eyebrow{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;background:rgba(212,255,78,0.08);border:1px solid rgba(212,255,78,0.15);border-radius:99px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.15em;color:var(--lime);margin-bottom:20px}
    h1{font-size:clamp(36px,6vw,56px);font-weight:900;letter-spacing:-0.04em;line-height:1}
    h1 em{font-style:normal;color:var(--lime)}
    .desc{font-size:15px;color:var(--subtle);line-height:1.7;max-width:320px;margin:20px auto 36px}
    .link{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;background:rgba(212,255,78,0.06);border:1px solid rgba(212,255,78,0.15);border-radius:10px;font-family:"Geist Mono",monospace;font-size:12px;color:var(--lime);text-decoration:none;transition:all 0.3s var(--spring)}
    .link:hover{background:rgba(212,255,78,0.10);transform:translateY(-2px)}
    .footer{position:fixed;bottom:28px;font-size:11px;font-family:"Geist Mono",monospace;color:rgba(128,128,160,0.4);z-index:2}
  </style>
</head>
<body>
  <div class="orb o1"></div>
  <div class="orb o2"></div>
  <div class="card">
    <div class="card-inner">
      <div class="mark">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#050505" stroke-width="2.8"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      </div>
      <div class="eyebrow">Personal Tool &middot; v2.0</div>
      <h1>Pin<em>Forge</em></h1>
      <p class="desc">Organic social media management tool for Pinterest and Instagram accounts.</p>
      <a href="/pinforge/privacy/" class="link">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        Privacy Policy &#x2192;
      </a>
    </div>
  </div>
  <div class="footer">&#169; 2026 PinForge</div>
</body>
</html>
